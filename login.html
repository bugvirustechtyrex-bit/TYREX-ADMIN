<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TYREX_KSH MD | Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#020617,#0b1026);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
width:320px;
padding:30px;
background:rgba(255,255,255,0.05);
border-radius:20px;
backdrop-filter:blur(10px);
text-align:center;
color:white;
box-shadow:0 0 25px #00bfff55;
}

h2{
color:#00d4ff;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:10px;
outline:none;
}

button{
width:100%;
padding:12px;
background:#00bfff;
border:none;
border-radius:10px;
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#00e1ff;
}

#error{
color:red;
margin-top:10px;
}
</style>

</head>
<body>

<div class="box">
<h2>TYREX_KSH LOGIN</h2>

<input type="text" id="username" placeholder="Username">
<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

<p id="error"></p>
</div>

<script>
function login(){
const username = document.getElementById("username").value;
const password = document.getElementById("password").value;

fetch("/login", {
method: "POST",
headers: {
"Content-Type": "application/json"
},
body: JSON.stringify({ username, password })
})
.then(res => res.json())
.then(data => {
if(data.success){
window.location.href = data.redirect;
}else{
document.getElementById("error").innerText = data.message;
}
});
}
</script>

</body>
</html>
