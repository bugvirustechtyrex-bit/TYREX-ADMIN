<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TYREX LOGIN</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0b0b1a;
            color: #fff;
            font-family: 'Segoe UI', Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        .login-card {
            max-width: 400px;
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(12px);
            border-radius: 36px;
            padding: 40px 30px 44px;
            box-shadow: 0 0 50px #ffcc0030, 0 0 100px #ffcc0015;
            border: 1px solid rgba(255, 204, 0, 0.15);
            text-align: center;
        }
        h2 {
            color: #ffcc00;
            font-size: 30px;
            letter-spacing: 4px;
            font-weight: 700;
            margin-bottom: 10px;
            text-shadow: 0 0 25px #ffcc0060;
        }
        .subtitle {
            color: rgba(255, 255, 255, 0.35);
            font-size: 14px;
            letter-spacing: 1.5px;
            margin-bottom: 32px;
            border-bottom: 1px solid rgba(255, 204, 0, 0.08);
            padding-bottom: 16px;
        }
        .input-group {
            margin-bottom: 18px;
            text-align: left;
        }
        .input-group label {
            display: block;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 0.8px;
            margin-bottom: 5px;
            padding-left: 4px;
        }
        input {
            width: 100%;
            padding: 14px 18px;
            border: none;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.06);
            color: white;
            font-size: 16px;
            transition: 0.25s;
            outline: 1px solid transparent;
            font-family: inherit;
        }
        input:focus {
            outline: 1px solid #ffcc00;
            background: rgba(255, 255, 255, 0.08);
        }
        input::placeholder {
            color: rgba(255, 255, 255, 0.25);
            font-weight: 300;
        }
        .btn-login {
            width: 100%;
            padding: 16px 10px;
            border: none;
            border-radius: 60px;
            background: linear-gradient(135deg, #ffcc00, #f5b800);
            color: #0b0b1a;
            font-weight: 700;
            font-size: 18px;
            letter-spacing: 1.5px;
            cursor: pointer;
            transition: 0.25s ease;
            box-shadow: 0 8px 25px #ffcc0030;
            margin-top: 10px;
        }
        .btn-login:hover:not(:disabled) {
            transform: scale(1.02);
            box-shadow: 0 12px 35px #ffcc0050;
        }
        .btn-login:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background: #444;
            color: #888;
        }
        #msg {
            margin-top: 22px;
            font-size: 15px;
            min-height: 28px;
            padding: 10px 12px;
            border-radius: 30px;
        }
        .msg-success {
            color: #00ff95;
            background: rgba(0, 255, 149, 0.08);
            border: 1px solid rgba(0, 255, 149, 0.15);
        }
        .msg-error {
            color: #ff4d6d;
            background: rgba(255, 77, 109, 0.08);
            border: 1px solid rgba(255, 77, 109, 0.15);
        }
        .footer {
            margin-top: 28px;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.12);
            border-top: 1px solid rgba(255, 255, 255, 0.03);
            padding-top: 18px;
        }
        .footer span {
            color: #ffcc0060;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>⚡ TYREX</h2>
        <div class="subtitle">secure access</div>
        <div class="input-group">
            <label for="username">👤 username</label>
            <input type="text" id="username" placeholder="Enter your username">
        </div>
        <div class="input-group">
            <label for="password">🔒 password</label>
            <input type="password" id="password" placeholder="Enter your password">
        </div>
        <button class="btn-login" id="loginBtn" onclick="handleLogin()">🔓 LOGIN</button>
        <div id="msg"></div>
        <div class="footer">TYREX <span>·</span> admin panel</div>
    </div>
    <script>
        const msgEl = document.getElementById('msg');
        const loginBtn = document.getElementById('loginBtn');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                if (active === usernameInput || active === passwordInput) {
                    e.preventDefault();
                    handleLogin();
                }
            }
        });

        async function handleLogin() {
            msgEl.innerText = '';
            msgEl.className = '';
            const username = usernameInput.value.trim();
            const password = passwordInput.value.trim();

            if (!username || !password) {
                msgEl.innerText = '❌ Please fill in all fields';
                msgEl.className = 'msg-error';
                return;
            }

            loginBtn.disabled = true;
            loginBtn.innerText = '⏳ LOADING...';

            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (data.success) {
                    msgEl.innerText = data.message || '✅ Login successful! Redirecting...';
                    msgEl.className = 'msg-success';
                    setTimeout(() => {
                        window.location.href = data.redirect || '/dashboard.html';
                    }, 400);
                } else {
                    msgEl.innerText = data.message || '❌ Invalid credentials';
                    msgEl.className = 'msg-error';
                }
            } catch (err) {
                msgEl.innerText = '⚠️ Connection error. Please try again.';
                msgEl.className = 'msg-error';
            } finally {
                loginBtn.disabled = false;
                loginBtn.innerText = '🔓 LOGIN';
            }
        }
    </script>
</body>
</html>
